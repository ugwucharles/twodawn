<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>2DAWN - Discover & Book Events in Nigeria | Concerts, Parties & More</title>
    <meta name="title" content="2DAWN - Discover & Book Events in Nigeria | Concerts, Parties & More" />
    <meta name="description" content="2DAWN is Nigeria's premier events platform. Discover and book tickets for concerts, parties, festivals, and amazing experiences across Nigeria. Simple, transparent pricing." />
    <meta name="keywords" content="events Nigeria, concert tickets, party tickets, book events, Lagos events, Abuja events, event booking, 2DAWN, Nigerian events" />
    <meta name="author" content="2DAWN" />
    <link rel="canonical" href="https://twodawn.com.ng/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://twodawn.com.ng/" />
    <meta property="og:title" content="2DAWN - Discover & Book Events in Nigeria" />
    <meta property="og:description" content="Discover and book tickets for concerts, parties, festivals, and amazing experiences across Nigeria. Simple, transparent pricing." />
    <meta property="og:image" content="https://twodawn.com.ng/logo-white2.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="2DAWN Logo" />
    <meta property="og:site_name" content="2DAWN" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://twodawn.com.ng/" />
    <meta name="twitter:title" content="2DAWN - Discover & Book Events in Nigeria" />
    <meta name="twitter:description" content="Discover and book tickets for concerts, parties, festivals, and amazing experiences across Nigeria." />
    <meta name="twitter:image" content="https://twodawn.com.ng/logo-white2.svg" />
    <meta name="twitter:image:alt" content="2DAWN Logo" />
    
    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "2DAWN",
      "url": "https://twodawn.com.ng",
      "logo": "https://twodawn.com.ng/logo.svg",
      "description": "2DAWN is Nigeria's premier events platform for discovering and booking tickets for concerts, parties, festivals, and amazing experiences.",
      "sameAs": [
        "https://instagram.com/2dawn.tix"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service"
      }
    }
    </script>
    
    <!-- Structured Data (WebSite) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "2DAWN",
      "url": "https://twodawn.com.ng",
      "description": "Discover and book events in Nigeria",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://twodawn.com.ng/events?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
