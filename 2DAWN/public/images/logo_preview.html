<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Previews - 2DAWN</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-w: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      padding: 24px;
      text-align: center;
    }
    .card h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 1.2rem;
      color: #666;
    }
    .preview-box {
      border-radius: 12px;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      margin-bottom: 15px;
    }
    .preview-box.light {
      background: #ffffff;
      border: 1px solid #e0e0e0;
    }
    .preview-box.dark {
      background: #0f172a;
    }
    .preview-box.checkered {
      background-color: #e5e5f7;
      background-image: radial-gradient(#d5d5f5 20%, transparent 20%),
                        radial-gradient(#d5d5f5 20%, transparent 20%);
      background-size: 16px 16px;
      background-position: 0 0, 8px 8px;
    }
    .svg-container {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>2DAWN SVG Logo Vector Previews</h1>
  
  <div class="grid">
    <!-- Card 1: Logo Light -->
    <div class="card">
      <h2>1. Logo Light (Transparent background)</h2>
      <div class="preview-box light">
        <!-- SVG Light on white background -->
        <img class="svg-container" src="logo_light.svg" alt="Logo Light">
      </div>
      <p>Rendered on a white background</p>
    </div>

    <!-- Card 2: Logo Dark -->
    <div class="card">
      <h2>2. Logo Dark (Embedded black card)</h2>
      <div class="preview-box light">
        <!-- SVG Dark on checkered bg -->
        <img class="svg-container" src="logo_dark.svg" alt="Logo Dark">
      </div>
      <p>Self-contained black rounded badge</p>
    </div>

    <!-- Card 3: Logo Icon -->
    <div class="card">
      <h2>3. Logo Icon (Square rounded badge)</h2>
      <div class="preview-box checkered">
        <!-- SVG Icon -->
        <img class="svg-container" src="logo_icon.svg" style="width: 80px; height: 80px;" alt="Logo Icon">
      </div>
      <p>Rounded square avatar version</p>
    </div>
  </div>
</body>
</html>
